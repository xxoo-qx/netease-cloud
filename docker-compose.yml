services:
  netease-cloud:
    build:
      context: .
      dockerfile: Dockerfile
    image: netease-cloud-main:local
    container_name: netease-cloud-main
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "18473:18473"
    volumes:
      - ./user_data:/data/user_data
      - ./docker-data/ncmm-home:/data/ncmm-home